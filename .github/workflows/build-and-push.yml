name: Build, push & deploy lit-api

on:
  push:
    branches: [main, feature/ghcr-ci]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/uabgh-emerging-technologies/lit-api:latest
            ghcr.io/uabgh-emerging-technologies/lit-api:${{ github.sha }}

  deploy-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.LITAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LITAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LITAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: lit-api
          resourceGroup: anes-ai
          imageToDeploy: ghcr.io/uabgh-emerging-technologies/lit-api:${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.LITAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LITAPI_REGISTRY_PASSWORD }}

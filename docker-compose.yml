lit_api:
  image: ais-lindocker.anesthesiology.uab.edu:5000/lit_search:dev
  command: uvicorn app.server:app --host 0.0.0.0 --port 8000
  environment:
    - PYTHONUNBUFFERED=1
  volumes:
    - /mnt/g/AINewsletter:/data/results
  secrets:
    - db_server
    - db_name
    - db_user
    - db_password
    - openai_api_key 
    - gpt4_api_key
    - libkey_api_key
    - ncbi_api_key
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
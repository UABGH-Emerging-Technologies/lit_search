services:
  lit_api:
    build: .
    ports:
      - "${LIT_API_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    secrets:
      - libkey_api_key
      - ncbi_api_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

  streamlit:
    build: .
    entrypoint: streamlit
    command: run streamlit/ScopingReview_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "${LIT_STREAMLIT_PORT:-8501}:8501"
    environment:
      PYTHONUNBUFFERED: "1"
      LIT_ENDPOINT: http://lit_api:8000
    secrets:
      - azure_proxy_key
      - azure_proxy_endpoint
    depends_on:
      lit_api:
        condition: service_healthy

# Secrets are sourced from environment variables by default.
# To use file-based secrets instead, comment the `environment:` line
# and uncomment the `file:` line for each secret, pointing to your local path.
secrets:
  libkey_api_key:
    environment: LIBKEY_API_KEY
    # file: ./secrets/libkey_api_key.txt
  ncbi_api_key:
    environment: NCBI_API_KEY
    # file: ./secrets/ncbi_api_key.txt
  azure_proxy_key:
    environment: AZURE_PROXY_KEY
    # file: ./secrets/azure_proxy_key.txt
  azure_proxy_endpoint:
    environment: AZURE_PROXY_ENDPOINT
    # file: ./secrets/azure_proxy_endpoint.txt
